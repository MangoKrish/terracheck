services:
  - type: web
    name: terracheck-api
    runtime: python
    repo: https://github.com/MangoKrish/terracheck
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.13.0"
